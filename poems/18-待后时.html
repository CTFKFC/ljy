<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>待后时｜烬与月</title>
  <meta name="description" content="夜叩屏光寂无应，三人语笑二人情。  春寻雪后夏寻蝉，人间四季总错行。  待到后时重执手，不教旧事扰新盟。  纵使前尘如露散，犹将痴骨换余生。" />
  <meta name="theme-color" content="#090a0f" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="poem-page-body">
  <div class="grain"></div>
  <div class="cursor" aria-hidden="true"></div>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <div class="ambient ambient-c"></div>
  <div class="veil veil-top"></div>

  <header class="site-header static-header glass">
    <a class="brand" href="../index.html">烬与月</a>
    <nav class="site-nav page-nav">
      <a href="../index.html#archive">目录</a>
      <a href="../index.html#poems">摘读</a>
    </nav>
  </header>

  <main>
    <section class="section poem-single-wrap">
      <div class="section-heading reveal">
        <p class="overline">18 / 33</p>
        <h1 class="hero-title poem-page-title reveal-char">待后时</h1>
        <p class="lead reveal">《越集》单篇页</p>
      </div>

      <article class="poem-article poem-single-article glass is-open is-featured reveal-up">
        <div class="poem-content">
          <p>夜叩屏光寂无应，三人语笑二人情。</p>
          <p>春寻雪后夏寻蝉，人间四季总错行。</p>
          <p>待到后时重执手，不教旧事扰新盟。</p>
          <p>纵使前尘如露散，犹将痴骨换余生。</p>
        </div>
      </article>

      <div class="footer-actions reveal" style="margin-top: 28px; justify-content: space-between;">
        <a class="button button-secondary magnetic" href="17-夜观天象有感.html">上一篇</a>
        <a class="button button-secondary magnetic" href="../index.html#archive">返回目录</a>
        <a class="button magnetic" href="19-不灭.html">下一篇</a>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const cursor = document.querySelector('.cursor');
      const isFinePointer = window.matchMedia('(pointer:fine)').matches;
      const isMobile = window.matchMedia('(max-width: 720px)').matches;
      if (cursor && isFinePointer && !isMobile) {
        let mx = window.innerWidth / 2, my = window.innerHeight / 2, cx = mx, cy = my;
        document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; }, { passive: true });
        const tick = () => {
          cx += (mx - cx) * 0.18;
          cy += (my - cy) * 0.18;
          cursor.style.left = cx + 'px';
          cursor.style.top = cy + 'px';
          requestAnimationFrame(tick);
        };
        tick();
        document.querySelectorAll('a, button, .button').forEach(el => {
          el.addEventListener('mouseenter', () => cursor.classList.add('cursor-hover'));
          el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-hover'));
        });
      }
      if (window.gsap && window.ScrollTrigger && !window.matchMedia('(prefers-reduced-motion: reduce)').matches && !isMobile) {
        gsap.registerPlugin(ScrollTrigger);
        gsap.fromTo('.reveal, .reveal-up, .reveal-char', { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: 0.8, stagger: 0.08, ease: 'power3.out' });
      } else {
        document.querySelectorAll('.reveal, .reveal-up, .reveal-char').forEach(el => {
          el.style.opacity = 1;
          el.style.transform = 'none';
        });
      }
    })();
  </script>
  <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
  <script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>
</body>
</html>
