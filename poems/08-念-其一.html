          </div>
        </div>
        <div class="poem-content"><p>恋君数载，君有新欢，余遂收心。</p><p>待君情尽，蛰伏数月，复又相近。君不拒亦不允，唯许闲谈。</p><p>余喜不自胜，明知缘浅难合，仍执意相赴，终至两散。</p><p>逾礼失度，愧失本心。前尘似露，一梦黄粱，徒留怅叹。</p><p>梦碎方知执念深，此后难遇心上人，惟愿此生再相见。</p><p>相思难斩，旧念长留，相逢无期，不敢奢求。</p></div>
